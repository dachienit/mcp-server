_schema-version: "3.1"
ID: abap-mcp-server
version: 1.0.0
description: "Model Context Protocol Server for ABAP ADT API (Streamable HTTP)"

modules:
  - name: abap-mcp-server
    type: nodejs
    path: .
    parameters:
      memory: 256M
      disk-quota: 512M
      buildpack: nodejs_buildpack
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: abap-mcp-xsuaa
      - name: abap-mcp-destination
      - name: abap-mcp-connectivity
    properties:
      # Default destination if none provided in header
      SAP_DESTINATION_NAME: T4X_011

resources:
  - name: abap-mcp-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: abap-mcp-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: abap-mcp-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
